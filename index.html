<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download our app</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; background: #f5f5f7; padding: 2rem; }
    .card { background: white; border-radius: 20px; padding: 2.5rem 2rem;
            text-align: center; max-width: 340px; width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 600; color: #1d1d1f; margin-bottom: 8px; }
    p { font-size: 15px; color: #6e6e73; margin-bottom: 2rem; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 10px;
           width: 100%; padding: 14px 20px; border-radius: 12px; text-decoration: none;
           font-size: 16px; font-weight: 500; margin-bottom: 12px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-android { background: #01875f; color: white; }
    .btn-ios { background: #0071e3; color: white; }
  </style>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var android = params.get('android');
      var ios = params.get('ios');
      var ua = navigator.userAgent || '';

      if (/android/i.test(ua) && android) {
        window.location.replace(android);
      } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream && ios) {
        window.location.replace(ios);
      }
      // Desktop/unknown: falls through to show the buttons below
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1>Download our app</h1>
    <p>Choose your platform below</p>
    <script>
      // Populate fallback buttons dynamically too
      (function() {
        var params = new URLSearchParams(window.location.search);
        var android = params.get('android') || '#';
        var ios = params.get('ios') || '#';
        document.write(
          '<a href="' + android + '" class="btn btn-android">&#9654; Google Play</a>' +
          '<a href="' + ios + '" class="btn btn-ios"> App Store</a>'
        );
      })();
    </script>
    <noscript>
      <p>Please enable JavaScript to be redirected automatically.</p>
    </noscript>
  </div>
</body>
</html>
